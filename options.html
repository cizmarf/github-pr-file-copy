<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GitHub PR File Copy - Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      padding: 16px;
      min-width: 400px;
      color: #24292f;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 16px 0;
      padding-bottom: 8px;
      border-bottom: 1px solid #d0d7de;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3);
    }
    .hint {
      font-size: 12px;
      color: #57606a;
      margin-top: 4px;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    .status.success {
      display: block;
      background: #dafbe1;
      color: #1a7f37;
    }
    .status.error {
      display: block;
      background: #ffebe9;
      color: #cf222e;
    }
    button {
      margin-top: 12px;
      padding: 8px 16px;
      background: #2da44e;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #2c974b;
    }
  </style>
</head>
<body>
  <h1>GitHub PR File Copy Options</h1>
  
  <label for="projectRoot">Project Root Path</label>
  <input type="text" id="projectRoot" placeholder="/Users/username/projects/my-repo">
  <p class="hint">
    Full local path to your repository root. Used for Cmd+Click to open files in IntelliJ.<br>
    Example: <code>/Users/john/dev/my-project</code>
  </p>
  
  <button id="save">Save</button>
  
  <div id="status" class="status"></div>
  
  <script src="options.js"></script>
</body>
</html>
